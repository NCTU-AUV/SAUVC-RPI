<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCA AUV Controller</title>
    <style>
        :root {
            --bg: #0b1320;
            --panel: #121f33;
            --text: #eaf0ff;
            --muted: #a2b2cf;
            --accent: #57c8ad;
            --border: #223250;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Noto Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at -10% -10%, rgba(87, 200, 173, 0.2), transparent 60%),
                radial-gradient(1000px 500px at 110% -20%, rgba(122, 167, 255, 0.2), transparent 60%),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(860px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .row {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        a {
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(87, 200, 173, 0.12);
        }

        .hint {
            margin-top: 14px;
            color: var(--accent);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>ORCA AUV Controller</h1>
        <p>This is the dedicated control page entry point. You can keep this page lightweight and add controller-only UI components here without affecting the full diagnostics dashboard.</p>
        <div class="row">
            <a href="/">Open Full Dashboard</a>
            <a href="/controller">Reload Controller Page</a>
        </div>
        <div class="hint">Route aliases enabled: /controller and /play</div>
    </main>
</body>
</html>
